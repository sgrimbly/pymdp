name: Test (Forgejo)

# Self-hosted variant of .github/workflows/test.yaml. Runs on the BatMobile
# Forgejo runner (label `batmobile`). No GitHub minute limits, so it runs
# leniently — full test + notebook pass with no timeout cap.

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: batmobile
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        uses: astral-sh/setup-uv@v6
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg graphviz libgraphviz-dev pkg-config build-essential python3-dev
      - name: Install dependencies
        run: uv sync --group test
      - name: Run unit tests with coverage
        run: uv run pytest test -n 2 -m "not nightly" --cov=pymdp --cov-report=term
      - name: Run CI-tier notebook tests
        run: uv run python scripts/run_notebook_manifest.py test/notebooks/ci_notebooks.txt
